name: CI — Continuous Integration

on:
  push:
    branches: [main, develop, "version-*"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.repository }}-${{ github.event.number || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_NAME: "velara"

jobs:
  # ─── Linting ─────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  eslint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    if: ${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts') != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ESLint
        run: npm install -g eslint

      - name: Run ESLint
        run: eslint ${{ env.APP_NAME }}/public/js/ --ext .js,.jsx || true

  # ─── Security Scan ──────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/javascript
            p/sql-injection
            p/xss
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          PATTERNS=(
            'password\s*=\s*["\x27][^"\x27]+'
            'api_key\s*=\s*["\x27]sk-'
            'secret\s*=\s*["\x27][^"\x27]+'
            'token\s*=\s*["\x27][^"\x27]+'
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rn --include="*.py" -E "$pattern" ${{ env.APP_NAME }}/ 2>/dev/null | grep -v "test" | grep -v "__pycache__" | grep -v ".pyc"; then
              FOUND=1
            fi
          done
          if [[ $FOUND -eq 1 ]]; then
            echo "⚠️ Potential hardcoded secrets found. Please review."
          else
            echo "✅ No hardcoded secrets detected."
          fi

  # ─── Frappe Standards Check ─────────────────────────────────────────────────
  frappe-standards:
    name: ⚙️ Frappe Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check forbidden patterns
        run: |
          echo "🔍 Checking Frappe v16 standards..."
          ERRORS=0

          # Check for override_doctype_class (FORBIDDEN)
          if grep -rn "override_doctype_class" ${{ env.APP_NAME }}/hooks.py 2>/dev/null; then
            echo "❌ FORBIDDEN: override_doctype_class found in hooks.py. Use extend_doctype_class."
            ERRORS=$((ERRORS + 1))
          fi

          # Check for frappe.db.commit() inside document event methods
          if grep -rn --include="*.py" -A2 'def \(validate\|on_update\|on_submit\|on_cancel\|before_save\|after_insert\)' ${{ env.APP_NAME }}/ 2>/dev/null | grep "frappe.db.commit()"; then
            echo "❌ FORBIDDEN: frappe.db.commit() inside document events."
            ERRORS=$((ERRORS + 1))
          fi

          # Check for unparameterized SQL
          if grep -rn --include="*.py" -E "frappe\.db\.sql\(f[\"']" ${{ env.APP_NAME }}/ 2>/dev/null; then
            echo "❌ FORBIDDEN: f-string SQL queries. Use parameterized queries."
            ERRORS=$((ERRORS + 1))
          fi

          # Check for eval/exec
          if grep -rn --include="*.py" -E '\beval\s*\(|\bexec\s*\(' ${{ env.APP_NAME }}/ 2>/dev/null | grep -v "test" | grep -v "__pycache__"; then
            echo "❌ FORBIDDEN: eval()/exec() usage found."
            ERRORS=$((ERRORS + 1))
          fi

          # Check whitelisted APIs have permission checks
          WHITELIST_FILES=$(grep -rln --include="*.py" "@frappe.whitelist" ${{ env.APP_NAME }}/ 2>/dev/null || true)
          for f in $WHITELIST_FILES; do
            FUNCS=$(grep -n "@frappe.whitelist" "$f" | while read -r line; do
              LINE_NUM=$(echo "$line" | cut -d: -f1)
              NEXT_LINES=$(sed -n "$((LINE_NUM+1)),$((LINE_NUM+10))p" "$f")
              FUNC_NAME=$(echo "$NEXT_LINES" | grep -m1 "def " | sed 's/.*def \([a-zA-Z_]*\).*/\1/')
              HAS_PERM=$(echo "$NEXT_LINES" | grep -c "has_permission\|frappe.only_for\|frappe.has_permission\|allow_guest" || true)
              if [[ "$HAS_PERM" -eq 0 && -n "$FUNC_NAME" ]]; then
                echo "  ⚠️ $f: $FUNC_NAME() — no permission check found"
              fi
            done)
            if [[ -n "$FUNCS" ]]; then
              echo "$FUNCS"
            fi
          done

          if [[ $ERRORS -gt 0 ]]; then
            echo "❌ $ERRORS forbidden pattern(s) found."
            exit 1
          fi
          echo "✅ Frappe standards check passed."

  # ─── Tests ──────────────────────────────────────────────────────────────────
  tests:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false

    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:11.8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.cache
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock', '**/package-lock.json') }}

      - name: Install MariaDB Client
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client

      - name: Setup Bench
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation --skip-assets --python "$(which python)" ~/frappe-bench

      - name: Install App
        working-directory: /home/runner/frappe-bench
        run: |
          bench get-app ${{ env.APP_NAME }} $GITHUB_WORKSPACE
          bench setup requirements --dev
          bench new-site --db-root-password root --admin-password admin test_site
          bench --site test_site install-app ${{ env.APP_NAME }}
          bench build --app ${{ env.APP_NAME }}
        env:
          CI: "Yes"

      - name: Run Tests
        working-directory: /home/runner/frappe-bench
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app ${{ env.APP_NAME }}
        env:
          TYPE: server

  # ─── Build Verification ─────────────────────────────────────────────────────
  build:
    name: 📦 Build Check
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bench & Build
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation --python "$(which python)" ~/frappe-bench
          cd ~/frappe-bench
          bench get-app ${{ env.APP_NAME }} $GITHUB_WORKSPACE
          bench build --app ${{ env.APP_NAME }}
        env:
          CI: "Yes"
