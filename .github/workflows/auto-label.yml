name: 🏷️ Auto Label Issues & PRs

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  auto-label:
    name: 🏷️ Auto Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ─── Label PRs based on changed files ─────────────────────────────────
      - name: Label PR by files changed
        if: github.event_name == 'pull_request'
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
        continue-on-error: true

      # ─── Label based on title patterns ─────────────────────────────────────
      - name: Label by title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue?.title || context.payload.pull_request?.title || '';
            const titleLower = title.toLowerCase();
            const labels = [];

            // Type detection from title prefix
            if (titleLower.startsWith('[bug]') || titleLower.includes('fix')) labels.push('bug');
            if (titleLower.startsWith('[feature]') || titleLower.includes('feat')) labels.push('enhancement');
            if (titleLower.startsWith('[docs]') || titleLower.includes('documentation')) labels.push('documentation');
            if (titleLower.includes('security') || titleLower.includes('أمان')) labels.push('security');
            if (titleLower.includes('performance') || titleLower.includes('أداء')) labels.push('performance');
            if (titleLower.includes('translation') || titleLower.includes('ترجمة') || titleLower.includes('i18n')) labels.push('translation');
            if (titleLower.includes('ui') || titleLower.includes('ux') || titleLower.includes('واجهة')) labels.push('ui/ux');
            if (titleLower.includes('breaking')) labels.push('breaking-change');

            // Scope detection
            if (titleLower.includes('doctype') || titleLower.includes('مستند')) labels.push('scope: doctype');
            if (titleLower.includes('api') || titleLower.includes('واجهة برمجة')) labels.push('scope: api');
            if (titleLower.includes('report') || titleLower.includes('تقرير')) labels.push('scope: report');
            if (titleLower.includes('workflow') || titleLower.includes('سير')) labels.push('scope: workflow');
            if (titleLower.includes('permission') || titleLower.includes('صلاحي')) labels.push('scope: permissions');

            if (labels.length > 0) {
              const issueOrPR = context.payload.issue || context.payload.pull_request;
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueOrPR.number,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            }
