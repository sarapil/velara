name: 🚀 Release & Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type — نوع الإصدار"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Pre-release — إصدار تجريبي"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  APP_NAME: "velara"

jobs:
  # ─── Validate ───────────────────────────────────────────────────────────────
  validate:
    name: ✅ Pre-release Validation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            # Get current version from __init__.py or pyproject.toml
            CURRENT=$(grep -oP '__version__\s*=\s*"\K[^"]+' ${{ env.APP_NAME }}/__init__.py 2>/dev/null || \
                      grep -oP 'version\s*=\s*"\K[^"]+' pyproject.toml 2>/dev/null || \
                      echo "0.0.0")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ inputs.release_type }}" in
              major) VERSION="$((MAJOR + 1)).0.0" ;;
              minor) VERSION="$MAJOR.$((MINOR + 1)).0" ;;
              patch) VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            esac
            if [[ "${{ inputs.prerelease }}" == "true" ]]; then
              VERSION="${VERSION}-rc.$(date +%Y%m%d%H%M)"
            fi
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📦 Release version: $VERSION (tag: $TAG)"

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            exit 1
          fi

  # ─── Build & Test ───────────────────────────────────────────────────────────
  build-test:
    name: 🧪 Build & Test
    runs-on: ubuntu-latest
    needs: [validate]
    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:11.8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Test
        run: |
          sudo apt-get update && sudo apt-get install -y mariadb-client
          pip install frappe-bench
          bench init --skip-redis-config-generation --skip-assets --python "$(which python)" ~/frappe-bench
          cd ~/frappe-bench
          bench get-app ${{ env.APP_NAME }} $GITHUB_WORKSPACE
          bench setup requirements --dev
          bench new-site --db-root-password root --admin-password admin test_site
          bench --site test_site install-app ${{ env.APP_NAME }}
          bench build --app ${{ env.APP_NAME }}
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app ${{ env.APP_NAME }}
        env:
          CI: "Yes"

  # ─── Generate Changelog ────────────────────────────────────────────────────
  changelog:
    name: 📝 Changelog
    runs-on: ubuntu-latest
    needs: [validate]
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [[ -z "$PREV_TAG" ]]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "## What's Changed — ما الذي تغيّر" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"

          # Group commits by type
          FEATURES=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="feat\|feature\|✨" -i 2>/dev/null || true)
          FIXES=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="fix\|bug\|🐛" -i 2>/dev/null || true)
          DOCS=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="doc\|📝" -i 2>/dev/null || true)
          PERF=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="perf\|⚡" -i 2>/dev/null || true)
          SECURITY=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="security\|🔒" -i 2>/dev/null || true)
          OTHERS=$(git log $RANGE --pretty=format:"- %s (%h)" --not --grep="feat\|feature\|fix\|bug\|doc\|perf\|security\|✨\|🐛\|📝\|⚡\|🔒" -i 2>/dev/null | head -20 || true)

          [[ -n "$FEATURES" ]] && echo "### ✨ Features — ميزات جديدة" >> "$GITHUB_OUTPUT" && echo "$FEATURES" >> "$GITHUB_OUTPUT" && echo "" >> "$GITHUB_OUTPUT"
          [[ -n "$FIXES" ]] && echo "### 🐛 Bug Fixes — إصلاحات" >> "$GITHUB_OUTPUT" && echo "$FIXES" >> "$GITHUB_OUTPUT" && echo "" >> "$GITHUB_OUTPUT"
          [[ -n "$SECURITY" ]] && echo "### 🔒 Security — أمان" >> "$GITHUB_OUTPUT" && echo "$SECURITY" >> "$GITHUB_OUTPUT" && echo "" >> "$GITHUB_OUTPUT"
          [[ -n "$PERF" ]] && echo "### ⚡ Performance — أداء" >> "$GITHUB_OUTPUT" && echo "$PERF" >> "$GITHUB_OUTPUT" && echo "" >> "$GITHUB_OUTPUT"
          [[ -n "$DOCS" ]] && echo "### 📝 Documentation — توثيق" >> "$GITHUB_OUTPUT" && echo "$DOCS" >> "$GITHUB_OUTPUT" && echo "" >> "$GITHUB_OUTPUT"
          [[ -n "$OTHERS" ]] && echo "### 🔧 Other Changes — تغييرات أخرى" >> "$GITHUB_OUTPUT" && echo "$OTHERS" >> "$GITHUB_OUTPUT" && echo "" >> "$GITHUB_OUTPUT"

          echo "EOF" >> "$GITHUB_OUTPUT"

  # ─── Create Release ────────────────────────────────────────────────────────
  release:
    name: 🎉 Create Release
    runs-on: ubuntu-latest
    needs: [validate, build-test, changelog]
    steps:
      - uses: actions/checkout@v4

      - name: Create Git tag (if manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.validate.outputs.tag }}" -m "Release ${{ needs.validate.outputs.tag }}"
          git push origin "${{ needs.validate.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: "${{ needs.validate.outputs.tag }} — ${{ env.APP_NAME }}"
          body: ${{ needs.changelog.outputs.changelog }}
          prerelease: ${{ inputs.prerelease || false }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Notify ────────────────────────────────────────────────────────────────
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [validate, release]
    if: always()
    steps:
      - name: Release notification
        run: |
          if [[ "${{ needs.release.result }}" == "success" ]]; then
            echo "✅ Release ${{ needs.validate.outputs.tag }} created successfully!"
            echo "📦 App: ${{ env.APP_NAME }}"
            echo "🔗 https://github.com/${{ github.repository }}/releases/tag/${{ needs.validate.outputs.tag }}"
          else
            echo "❌ Release failed. Check the workflow logs."
          fi
