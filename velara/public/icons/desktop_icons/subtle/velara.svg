<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 54 54" width="54" height="54">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#E8D8A0"/>
    </linearGradient>
  </defs>
  <rect width="54" height="54" rx="12" fill="none" stroke="#1B2A4A" stroke-width="1.5"/>
  <!-- Building outline -->
  <rect x="17" y="10" width="20" height="30" rx="2" fill="none" stroke="url(#g)" stroke-width="1.2"/>
  <rect x="9" y="18" width="8" height="22" rx="2" fill="none" stroke="url(#g)" stroke-width="1.2"/>
  <rect x="37" y="18" width="8" height="22" rx="2" fill="none" stroke="url(#g)" stroke-width="1.2"/>
  <!-- Windows -->
  <g fill="none" stroke="#1B2A4A" stroke-width="0.8">
    <rect x="21" y="14" width="4" height="4" rx="0.5"/>
    <rect x="29" y="14" width="4" height="4" rx="0.5"/>
    <rect x="21" y="22" width="4" height="4" rx="0.5"/>
    <rect x="29" y="22" width="4" height="4" rx="0.5"/>
  </g>
  <!-- Star -->
  <polygon points="27,5 28.5,9 33,9 29.5,11.5 30.5,15.5 27,13 23.5,15.5 24.5,11.5 21,9 25.5,9"
           fill="none" stroke="url(#g)" stroke-width="1"/>
  <!-- Base -->
  <line x1="6" y1="40" x2="48" y2="40" stroke="url(#g)" stroke-width="1" stroke-linecap="round"/>
  <!-- V text -->
  <text x="27" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="700" fill="url(#g)">V</text>
</svg>
