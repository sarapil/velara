<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#E8D8A0"/>
    </linearGradient>
  </defs>
  <!-- Icon container -->
  <rect x="5" y="10" width="60" height="60" rx="12" fill="#1B2A4A"/>
  <!-- Building -->
  <rect x="18" y="20" width="20" height="30" rx="2" fill="url(#lg)"/>
  <rect x="10" y="28" width="8" height="22" rx="2" fill="url(#lg)"/>
  <rect x="38" y="28" width="8" height="22" rx="2" fill="url(#lg)"/>
  <!-- Windows -->
  <g fill="#1B2A4A">
    <rect x="22" y="24" width="4" height="4" rx="0.5"/>
    <rect x="30" y="24" width="4" height="4" rx="0.5"/>
    <rect x="22" y="32" width="4" height="4" rx="0.5"/>
    <rect x="30" y="32" width="4" height="4" rx="0.5"/>
  </g>
  <!-- Door -->
  <rect x="25" y="44" width="6" height="6" rx="1" fill="#1B2A4A"/>
  <!-- Star -->
  <polygon points="28,15 29.5,19 34,19 30.5,21.5 31.5,25 28,23 24.5,25 25.5,21.5 22,19 26.5,19" fill="url(#lg)"/>
  <!-- Base line -->
  <line x1="7" y1="50" x2="63" y2="50" stroke="url(#lg)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- VELARA text -->
  <text x="85" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#1B2A4A" letter-spacing="4">VELARA</text>
  <!-- Tagline -->
  <text x="85" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#C9A84C" letter-spacing="2.5">HOTEL MANAGEMENT</text>
</svg>
